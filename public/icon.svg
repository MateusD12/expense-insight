<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a6b"/>
      <stop offset="100%" stop-color="#0c1c3a"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="55" y1="440" x2="457" y2="440" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>
  <line x1="55" y1="360" x2="457" y2="360" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>
  <line x1="55" y1="280" x2="457" y2="280" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>
  <line x1="55" y1="200" x2="457" y2="200" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>
  <line x1="55" y1="120" x2="457" y2="120" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>

  <!-- Bar 1 -->
  <rect x="60" y="340" width="72" height="100" rx="10" fill="#1d4ed8" opacity="0.8"/>
  <!-- Bar 2 -->
  <rect x="156" y="260" width="72" height="180" rx="10" fill="#2563eb" opacity="0.9"/>
  <!-- Bar 3 -->
  <rect x="252" y="195" width="72" height="245" rx="10" fill="#3b82f6"/>
  <!-- Bar 4 (golden accent) -->
  <rect x="348" y="155" width="72" height="285" rx="10" fill="url(#bar4)"/>

  <!-- Trend line -->
  <polyline
    points="96,325 192,243 288,178 384,138"
    stroke="#fbbf24"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />

  <!-- Trend dots -->
  <circle cx="96" cy="325" r="14" fill="#fbbf24" filter="url(#glow)"/>
  <circle cx="192" cy="243" r="14" fill="#fbbf24" filter="url(#glow)"/>
  <circle cx="288" cy="178" r="14" fill="#fbbf24" filter="url(#glow)"/>
  <circle cx="384" cy="138" r="14" fill="#fbbf24" filter="url(#glow)"/>

  <!-- Inner dot highlight -->
  <circle cx="96" cy="325" r="6" fill="#ffffff" opacity="0.7"/>
  <circle cx="192" cy="243" r="6" fill="#ffffff" opacity="0.7"/>
  <circle cx="288" cy="178" r="6" fill="#ffffff" opacity="0.7"/>
  <circle cx="384" cy="138" r="6" fill="#ffffff" opacity="0.7"/>

  <!-- Bottom baseline -->
  <line x1="55" y1="442" x2="457" y2="442" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
</svg>
